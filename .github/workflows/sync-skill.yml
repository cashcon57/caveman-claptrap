name: Sync SKILL.md and rules

on:
  push:
    branches: [main]
    paths:
      - skills/caveman-claptrap/SKILL.md
      - rules/caveman-claptrap-activate.md
      - .codex/hooks.json
      - scripts/caveman-claptrap-codex-activate.js
      - caveman-claptrap-compress/SKILL.md
      - caveman-claptrap-compress/scripts/**

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Sync SKILL.md copies
        run: |
          cp skills/caveman-claptrap/SKILL.md caveman-claptrap/SKILL.md
          cp skills/caveman-claptrap/SKILL.md plugins/caveman-claptrap/skills/caveman-claptrap/SKILL.md
          cp skills/caveman-claptrap/SKILL.md .cursor/skills/caveman-claptrap/SKILL.md
          mkdir -p .windsurf/skills/caveman-claptrap
          cp skills/caveman-claptrap/SKILL.md .windsurf/skills/caveman-claptrap/SKILL.md

      - name: Sync Codex activation assets
        run: |
          mkdir -p plugins/caveman-claptrap/scripts
          cp .codex/hooks.json plugins/caveman-claptrap/hooks.json
          cp scripts/caveman-claptrap-codex-activate.js plugins/caveman-claptrap/scripts/caveman-claptrap-codex-activate.js

      - name: Sync compress skill to plugin
        run: |
          # Copy SKILL.md and patch process instructions for plugin context
          cp caveman-claptrap-compress/SKILL.md plugins/caveman-claptrap/skills/caveman-claptrap-compress/SKILL.md
          sed -i "s|The compression scripts live in \`caveman-claptrap-compress/scripts/\` (adjacent to this SKILL.md). If the path is not immediately available, search for \`caveman-claptrap-compress/scripts/__main__.py\`.|This SKILL.md lives alongside \`scripts/\` in the same directory. Find that directory.|" plugins/caveman-claptrap/skills/caveman-claptrap-compress/SKILL.md
          sed -i 's|cd caveman-claptrap-compress && python3|cd <directory_containing_this_SKILL.md> \&\& python3|' plugins/caveman-claptrap/skills/caveman-claptrap-compress/SKILL.md
          # Copy scripts verbatim
          rm -rf plugins/caveman-claptrap/skills/caveman-claptrap-compress/scripts
          cp -r caveman-claptrap-compress/scripts plugins/caveman-claptrap/skills/caveman-claptrap-compress/scripts
          rm -rf plugins/caveman-claptrap/skills/caveman-claptrap-compress/scripts/__pycache__

      - name: Rebuild caveman-claptrap.skill ZIP
        run: cd skills && zip -r ../caveman-claptrap.skill caveman-claptrap/

      - name: Sync auto-activation rules
        run: |
          BODY="rules/caveman-claptrap-activate.md"

          # Cline + Copilot — no frontmatter, direct copy
          mkdir -p .clinerules .github
          cp "$BODY" .clinerules/caveman-claptrap.md
          cp "$BODY" .github/copilot-instructions.md

          # Cursor — needs alwaysApply frontmatter
          mkdir -p .cursor/rules
          printf '%s\n' '---' 'description: "Claptrap mode — terse communication, ~75% fewer tokens, full technical accuracy"' 'alwaysApply: true' '---' '' > .cursor/rules/caveman-claptrap.mdc
          cat "$BODY" >> .cursor/rules/caveman-claptrap.mdc

          # Windsurf — needs always_on frontmatter
          mkdir -p .windsurf/rules
          printf '%s\n' '---' 'trigger: always_on' '---' '' > .windsurf/rules/caveman-claptrap.md
          cat "$BODY" >> .windsurf/rules/caveman-claptrap.md

      - name: Commit and push if changed
        run: |
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync SKILL.md copies and auto-activation rules [skip ci]"
          git push
